version: '3'
services:
 mysql: 
    image: mysql:5.7
    restart: always
    container_name: mysql_desafio_client_server
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql_desafio_client_server
      MYSQL_USER: mysql_desafio_client_server
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql